<body>
    <form  action="recruit/submitexam" method="POST" id="form1">
    	<div class="contentT">
	    	<h1 style="display: block;">面试题目(总共5题)</h1>
	    	<div style="height: 50px; width: 100%;">
	    		<h3>共5题，每题20分，总分100分。</h3>
	    		<!--<h4>计时：1:00</h4>-->
	    	</div>
	    	<hr style="border-top:2px dotted #444444; width: 100%; float: left;" >
	    	<div class="questionText">
	    		<div class="view">
	    			<p name="Q1">1:在上课之前我需要做好哪些准备以确保阅读活动能够对孩子有效果？</p>
	    			<textarea name="An1" class="textareaT" placeholder="答：" value=""></textarea>
	    			<hr>
	    		</div>
	    		<div class="view">
	    			<p name="Q2">2.我需要设计哪些小活动才能提高孩子参与的积极性，不让孩子觉得上我的课很无聊？</p>
	    			<textarea name="An2" class="textareaT" placeholder="答：" value=""></textarea>
	    			<hr>
	    		</div>
	    		<div class="view">
	    			<p name="Q3">3.我应该设计哪些问题才能促进孩子思考，帮助孩子进一步理解文本？请举例。</p>
	    			<textarea name="An3" class="textareaT" placeholder="答：" value=""></textarea>
	    			<hr>
	    		</div>
	    		<div class="view">
	    			<p name="Q4" >4.当孩子在发言时，我需要做什么？接下来又需要做什么？</p>
	    			<textarea name="An4" class="textareaT" placeholder="答：" value=""></textarea>
	    			<hr>
	    		</div>
	    		<div class="view">
	    			<p name="Q5">5.在每次上完课后，我为什么都需要去反思？</p>
	    			<textarea name="An5" class="textareaT" placeholder="答：" value=""></textarea>
	    			<hr>
	    		</div>
	    		<p>答题人：<input type="text" name="tester" style="border-bottom: 1px solid black; width: 80px; border-top-width: 0; border-right-width: 0; border-left-width: 0;"></p>

	    		<p>电话：<input type="text" name="telphone" style="border-bottom: 1px solid black; width: 80px; border-top-width: 0; border-right-width: 0; border-left-width: 0;"></p>

	    		<p>邮件：<input type="text" name="mail" style="border-bottom: 1px solid black; width: 80px; border-top-width: 0; border-right-width: 0; border-left-width: 0;"></p>
	    		
	    	</div>
    	</div>


    	<input type="submit" value="提交" class="submitT" />
